Custom challenges:
  - Type: grammarTable
    Prompt: Complete the Somali present tense pattern for `tag-` by matching each person with the right full sentence.
    Table title: Present tense of `tag-`
    Row header: Person
    Prompt header: English cue
    Answer header: Somali form
    Rows:
      - Label: I
        Prompt: I am going.
        Answer: Waan tagayaa.

      - Label: You
        Prompt: You are going.
        Answer: Waad tagaysaa.

      - Label: He
        Prompt: He is going.
        Answer: Wuu tagayaa.

      - Label: She
        Prompt: She is going.
        Answer: Way tagaysaa.

      - Label: We (including you)
        Prompt: We are going, including you.
        Answer: Waynu tagaynaa.
        Also accepted:
          - Waynu tagayna.

      - Label: We (not including you)
        Prompt: We are going, not including you.
        Answer: Waannu tagaynaa.
        Also accepted:
          - Waannu tagayna.

      - Label: You all
        Prompt: You all are going.
        Answer: Waydin tagaysaan.

      - Label: They
        Prompt: They are going.
        Answer: Way tagayaan.

